name: Build Windows Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies + PyInstaller
        working-directory: desktop/core
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Compile Python core with PyInstaller
        working-directory: desktop/core
        run: |
          pyinstaller --onefile --name typewiz-core --distpath ../electron/bundled-core --hidden-import requests --hidden-import requests.adapters --hidden-import urllib3 --hidden-import certifi --collect-all certifi main.py

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Electron dependencies
        working-directory: desktop/electron
        run: npm install

      - name: Build installer
        working-directory: desktop/electron
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: TypeWiz-Windows-Installer
          path: desktop/electron/dist/*.exe
          retention-days: 30
